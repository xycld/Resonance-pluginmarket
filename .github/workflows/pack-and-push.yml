name: Pack and Push

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    types: [closed]
  push:
    branches: [main]
    paths: ['plugins-data/**']

concurrency:
  group: pack-and-push
  cancel-in-progress: true

jobs:
  pack:
    if: github.event_name != 'pull_request' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd scripts && npm ci

      - name: Pack plugins
        run: cd scripts && node pack-plugins.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugins.json previews/ plugins-data/
          git diff --staged --quiet || git commit -m "chore: update plugin index"
          git push
